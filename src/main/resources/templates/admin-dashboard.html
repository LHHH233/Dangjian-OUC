<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 党员管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .welcome {
            color: #666;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-title {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .menu-icon {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .menu-description {
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 60px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">党员管理系统</div>
            <div class="user-info">
                <span class="welcome">欢迎，<span sec:authentication="name">管理员</span></span>
                <a href="/logout" class="logout-btn">退出登录</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 class="dashboard-title">管理后台</h1>

        <div class="menu-grid">
            <a href="/admin/import" class="menu-card">
                <div class="menu-icon">📊</div>
                <div class="menu-title">Excel数据导入</div>
                <div class="menu-description">
                    批量导入党员信息数据<br>
                    支持.xlsx和.xls格式文件
                </div>
            </a>

            <a href="/query" class="menu-card">
                <div class="menu-icon">🔍</div>
                <div class="menu-title">党员信息查询</div>
                <div class="menu-description">
                    查询和搜索党员信息<br>
                    支持多种查询条件
                </div>
            </a>

            <a href="/admin/members" class="menu-card">
                <div class="menu-icon">👥</div>
                <div class="menu-title">党员信息管理</div>
                <div class="menu-description">
                    添加、编辑、删除党员信息<br>
                    管理党员档案数据
                </div>
            </a>

            <a href="/admin/members" class="menu-card">
                <div class="menu-icon">📋</div>
                <div class="menu-title">报表统计</div>
                <div class="menu-description">
                    生成各类统计报表<br>
                    数据分析和导出功能
                </div>
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalMembers ?: 0}">0</div>
                <div class="stat-label">党员总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${activeMembers ?: 0}">0</div>
                <div class="stat-label">正式党员</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${preparatoryMembers ?: 0}">0</div>
                <div class="stat-label">预备党员</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${organizations ?: 0}">0</div>
                <div class="stat-label">组织数量</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 党员管理系统. 保留所有权利.</p>
    </div>
</body>
</html>
