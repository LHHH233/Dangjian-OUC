<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>党员详细信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .member-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-group h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .info-item {
            display: flex;
            margin-bottom: 10px;
            padding: 5px 0;
        }
        
        .info-label {
            font-weight: 500;
            color: #555;
            min-width: 100px;
            margin-right: 10px;
        }
        
        .info-value {
            color: #333;
            flex: 1;
        }
        
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 0 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>党员详细信息</h1>
        </div>
        
        <div class="member-info">
            <div class="info-group">
                <h3>基本信息</h3>
                <div class="info-item">
                    <span class="info-label">姓名：</span>
                    <span class="info-value" th:text="${member.name}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">性别：</span>
                    <span class="info-value" th:text="${member.gender}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">民族：</span>
                    <span class="info-value" th:text="${member.ethnicGroup}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">政治面貌：</span>
                    <span class="info-value" th:text="${member.politicalStatus}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">入党日期：</span>
                    <span class="info-value" th:text="${member.joinDate != null ? #temporals.format(member.joinDate, 'yyyy年MM月dd日') : '未填写'}"></span>
                </div>
            </div>
            
            <div class="info-group">
                <h3>身份信息</h3>
                <div class="info-item">
                    <span class="info-label">身份证号：</span>
                    <span class="info-value" th:text="${member.idCardNumber}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">出生日期：</span>
                    <span class="info-value" th:text="${member.birthDate != null ? #temporals.format(member.birthDate, 'yyyy年MM月dd日') : '未填写'}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">出生地：</span>
                    <span class="info-value" th:text="${member.birthplace}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">家庭住址：</span>
                    <span class="info-value" th:text="${member.residence}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">手机号：</span>
                    <span class="info-value" th:text="${member.phoneNumber}"></span>
                </div>
            </div>
            
            <div class="info-group">
                <h3>教育信息</h3>
                <div class="info-item">
                    <span class="info-label">入学日期：</span>
                    <span class="info-value" th:text="${member.admissionDate != null ? #temporals.format(member.admissionDate, 'yyyy年MM月dd日') : '未填写'}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">学历：</span>
                    <span class="info-value" th:text="${member.degree}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">专业：</span>
                    <span class="info-value" th:text="${member.major}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">年级：</span>
                    <span class="info-value" th:text="${member.classOfYear}"></span>
                </div>
            </div>
            
            <div class="info-group">
                <h3>组织信息</h3>
                <div class="info-item">
                    <span class="info-label">所在党组织：</span>
                    <span class="info-value" th:text="${member.organization}"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">序号：</span>
                    <span class="info-value" th:text="${member.serialNumber}"></span>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <a th:href="@{/simple-proof/{id}(id=${member.id})}" class="btn">导出证明</a>
            <a href="/query" class="btn btn-secondary">返回查询</a>
        </div>
        
        <div class="back-link">
            <a href="/">返回首页</a>
        </div>
    </div>
</body>
</html>
